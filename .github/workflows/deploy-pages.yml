# Managed by commitmaxxer max-edits.
name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: configure_pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true

      - name: Skip deploy if Pages is unavailable
        if: steps.configure_pages.outcome != 'success'
        run: echo "GitHub Pages is not enabled or unavailable for this repository. Skipping deploy."

      - name: Install dependencies
        if: steps.configure_pages.outcome == 'success'
        run: npm ci

      - name: Build app
        if: steps.configure_pages.outcome == 'success'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.configure_pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to Pages
        if: steps.configure_pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
